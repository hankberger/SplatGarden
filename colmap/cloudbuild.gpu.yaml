# Cloud Build config for the GPU COLMAP image.
#
# Uses Dockerfile.gpu (multi-stage CUDA 12.2 build). `gcloud builds submit
# --tag` doesn't accept a custom Dockerfile path, so we go through a config
# file instead. Run with:
#
#   gcloud builds submit . `
#     --config cloudbuild.gpu.yaml `
#     --timeout=45m `
#     --machine-type=e2-highcpu-32 `
#     --substitutions=_IMAGE=us-central1-docker.pkg.dev/splatgarden/splatgarden/colmap:gpu-v1
substitutions:
  _IMAGE: us-central1-docker.pkg.dev/splatgarden/splatgarden/colmap:gpu-v1

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --file=Dockerfile.gpu
      - --tag=${_IMAGE}
      - .

images:
  - ${_IMAGE}
